<body>

<H1 class="contact-header">We'd love to hear from you.</H1>
<h2 class="contact-header1">We try to respond within 24 hours.</h2>
<br>

<div class="contact-flex-box">
    <div>
        <img src="../static/grouppic7.png" style="width:500px;" alt="centered">
    </div>
    <div class="contact-form">
        <h2>Contact Us Here</h2>
        <form id="contactForm">
            <label>Name:</label><br>
            <input type="text" name="name" required><br><br>

            <label>Email:</label><br>
            <input type="email" name="email" required><br><br>

            <label>Message:</label><br>
            <textarea name="message" required></textarea><br><br>

            <button type="submit">Send</button>
        </form>
    </div>
    <div>
        <img src="../static/grouppic6.png" style="width:550px" alt=centered">
    </div>
</div>

    <div id="responseMessage"></div>


    <script>
        document.getElementById("contactForm").addEventListener("submit", function(e) {
            e.preventDefault(); // Stop normal form submission

            const formData = new FormData(this);

            fetch("/send", {
                method: "POST",
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                const msgDiv = document.getElementById("responseMessage");
                msgDiv.textContent = data.message;
                msgDiv.className = data.status === "success" ? "success" : "error";
                msgDiv.style.opacity = 1;

                if (data.status === "success") {
                    // Clear form fields
                    document.getElementById("contactForm").reset();

                    // Fade out message after 5 seconds
                    setTimeout(() => {
                        msgDiv.style.opacity = 0;
                    }, 5000);
                }
            })
            .catch(error => {
                const msgDiv = document.getElementById("responseMessage");
                msgDiv.textContent = "❌ An unexpected error occurred.";
                msgDiv.className = "error";
                msgDiv.style.opacity = 1;
            });
        });
    </script>
